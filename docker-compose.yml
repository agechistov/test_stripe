services:
  project:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      DJANGO_SETTINGS_MODULE: project.settings
    depends_on:
      - db
    ports:
      - "8000:8000"
  db:
    image: postgres:18.1
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
